<script>
  (function () {
    // After a new GitHub Pages deploy, browsers with cached old bundles will
    // fail to lazy-load story chunks (404 — the old hash no longer exists on
    // the server). On first failure, reload; the browser then fetches fresh
    // HTML (10-min cache) which references the correct new chunk hashes.
    // sessionStorage prevents an infinite loop if the server itself is broken.
    var KEY = 'sb_chunk_retry';
    window.addEventListener('unhandledrejection', function (e) {
      var msg = e.reason && (e.reason.message || String(e.reason));
      if (msg && msg.includes('dynamically imported module')) {
        e.preventDefault();
        if (!sessionStorage.getItem(KEY)) {
          sessionStorage.setItem(KEY, '1');
          window.location.reload();
        }
      }
    });
    window.addEventListener('load', function () {
      sessionStorage.removeItem(KEY);
    });
  })();
</script>
<style>
  /*
   * Sets the preview iframe background/text for every page — stories, docs,
   * and pure-prose MDX (Foundation, Introduction, etc.).
   * The data-theme attribute is set by the module-level channel listener and
   * the decorator in preview.tsx; these rules consume it via CSS variables.
   */
  html,
  body,
  #storybook-root,
  .sb-show-main,
  .sb-main-padded {
    background: var(--packt-bg-page);
    color: var(--packt-content-primary);
    transition: background 120ms ease, color 120ms ease;
    min-height: 100%;
  }
</style>
