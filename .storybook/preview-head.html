<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@16..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />
<script>
  (function () {
    var KEY = 'sb_chunk_retry';

    function reload() {
      if (!sessionStorage.getItem(KEY)) {
        sessionStorage.setItem(KEY, '1');
        window.location.reload();
      }
    }

    // Vite emits this event specifically when a dynamic import or preload fails.
    // This is more reliable than unhandledrejection because Storybook may catch
    // the promise internally before it becomes "unhandled".
    window.addEventListener('vite:preloadError', function (e) {
      e.preventDefault();
      reload();
    });

    // Fallback: catch any remaining unhandled chunk-fetch rejections.
    window.addEventListener('unhandledrejection', function (e) {
      var msg = e.reason && (e.reason.message || String(e.reason));
      if (msg && (msg.includes('dynamically imported module') || msg.includes('Failed to fetch'))) {
        e.preventDefault();
        reload();
      }
    });

    // Clear the retry flag once the page has loaded successfully.
    window.addEventListener('load', function () {
      sessionStorage.removeItem(KEY);
    });
  })();
</script>
<style>
  /*
   * Sets the preview iframe background/text for every page — stories, docs,
   * and pure-prose MDX (Foundation, Introduction, etc.).
   * The data-theme attribute is set by the module-level channel listener and
   * the decorator in preview.tsx; these rules consume it via CSS variables.
   */
  html,
  body,
  #storybook-root,
  .sb-show-main,
  .sb-main-padded {
    background: var(--packt-bg-page);
    color: var(--packt-content-primary);
    transition: background 120ms ease, color 120ms ease;
    min-height: 100%;
  }
</style>
